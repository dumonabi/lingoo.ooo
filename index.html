<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1412" />
    <meta name="description" content="Lingu.ooo — speak in either language, AI translates automatically" />
    <title>Lingu.ooo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="logo">
          <span class="logo-icon" id="logo-icon" aria-hidden="true"></span>
          <h1>Lingu.ooo</h1>
        </div>
      </header>

      <section class="language-bar">
        <div id="lang-picker-1" class="lang-picker-slot"></div>
        <div id="lang-picker-2" class="lang-picker-slot"></div>
      </section>

      <div class="mic-area">
        <div class="live-transcript" id="live-transcript" hidden></div>
        <div class="mic-ring-wrap" id="mic-ring-wrap">
          <svg
            class="mic-progress-ring"
            id="progress-ring"
            viewBox="0 0 120 120"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
            aria-label="Progress"
          >
            <circle class="mic-progress-bg" cx="60" cy="60" r="54" />
            <circle class="mic-progress-fill" id="progress-ring-fill" cx="60" cy="60" r="54" />
          </svg>
          <button type="button" class="main-mic-btn" id="main-mic" aria-label="Tap to speak">
            <span class="mic-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.03c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
            </span>
            <span class="mic-waveform" id="mic-waveform" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <section class="conversation-layout" aria-label="Conversation">
        <div class="message-panel-body" id="current-message"></div>
      </section>

      <div class="pending-banner" id="pending-banner" hidden>
        <p id="pending-text" class="pending-text"></p>
        <div class="pending-actions">
          <button type="button" class="pending-retry" id="pending-retry">Retry now</button>
          <button type="button" class="pending-dismiss" id="pending-dismiss">Dismiss</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast" hidden></div>

    <div class="auth-gate" id="auth-gate" hidden>
      <div class="auth-card">
        <span class="auth-logo" id="auth-logo" aria-hidden="true"></span>
        <h2>Access code</h2>
        <p class="auth-hint">Enter the code to start using Lingu.ooo.</p>
        <form id="auth-form">
          <input
            type="password"
            id="auth-input"
            class="auth-input"
            placeholder="Access code"
            autocomplete="current-password"
            required
          />
          <button type="submit" class="auth-submit" id="auth-submit">Continue</button>
        </form>
        <p class="auth-error" id="auth-error" hidden></p>
      </div>
    </div>

    <div class="auth-gate" id="mic-help" hidden>
      <div class="auth-card help-card">
        <h2 id="mic-help-title">Microphone access</h2>
        <p class="auth-hint" id="mic-help-intro"></p>
        <ol class="help-steps" id="mic-help-steps"></ol>
        <button type="button" class="auth-submit" id="mic-help-retry">Try again</button>
        <button type="button" class="help-dismiss" id="mic-help-close">Close</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
