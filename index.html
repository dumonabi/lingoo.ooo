<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1412" />
    <meta name="description" content="Lingo — speak in either language, AI translates automatically" />
    <title>Lingo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="logo">
          <span class="logo-icon" id="logo-icon" aria-hidden="true"></span>
          <h1>Lingo</h1>
        </div>
      </header>

      <section class="language-bar">
        <div id="lang-picker-1" class="lang-picker-slot"></div>
        <div id="lang-picker-2" class="lang-picker-slot"></div>
      </section>

      <div class="mic-area">
        <div class="live-transcript" id="live-transcript" hidden></div>
        <button type="button" class="main-mic-btn" id="main-mic" aria-label="Tap to speak">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.03c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
        </button>
      </div>

      <section class="conversation" id="conversation"></section>
    </div>

    <div class="toast" id="toast" hidden></div>

    <div class="auth-gate" id="auth-gate" hidden>
      <div class="auth-card">
        <span class="auth-logo" id="auth-logo" aria-hidden="true"></span>
        <h2>Access code</h2>
        <p class="auth-hint">Enter the code to start using Lingo.</p>
        <form id="auth-form">
          <input
            type="password"
            id="auth-input"
            class="auth-input"
            placeholder="Access code"
            autocomplete="current-password"
            required
          />
          <button type="submit" class="auth-submit" id="auth-submit">Continue</button>
        </form>
        <p class="auth-error" id="auth-error" hidden></p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
